name: e_shuttle
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.30.1
  cloud_firestore: ^4.17.2
  cupertino_icons: ^1.0.6
  qr_flutter: ^4.1.0
  google_maps_flutter: 2.6.1
  smooth_page_indicator: ^1.2.0+3
  mobile_scanner: 6.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/real_time_tracking.png
    - assets/e_ticket.png
    - assets/sos2.png
    - assets/welcome.png
plugins {
    id "com.android.application"
    id 'com.google.gms.google-services'
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id 'com.google.android.libraries.mapsplatform.secrets-gradle-plugin'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.example.e_shuttle"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.e_shuttle"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    // Load the API key from secrets.properties or fallback to local.defaults.properties
    def secretsPropertiesFile = rootProject.file("secrets.properties")
    def defaultsPropertiesFile = rootProject.file("local.defaults.properties")
    def secrets = new Properties()

    if (secretsPropertiesFile.exists()) {
        secrets.load(new FileInputStream(secretsPropertiesFile))
    } else if (defaultsPropertiesFile.exists()) {
        secrets.load(new FileInputStream(defaultsPropertiesFile))
    } else {
        throw new GradleException("No API key found. Please create secrets.properties or local.defaults.properties")
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            resValue "string", "google_maps_key", secrets["MAPS_API_KEY"]
        }
        debug {
            resValue "string", "google_maps_key", secrets["MAPS_API_KEY"]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Add your dependencies here
}
